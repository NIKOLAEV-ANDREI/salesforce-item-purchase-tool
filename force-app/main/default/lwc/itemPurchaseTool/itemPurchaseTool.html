<template>
    <lightning-card title="Item Purchase Tool" icon-name="standard:product_item">
        <div class="slds-var-p-around_medium">
            <template if:false={hasRecordId}>
                <p class="slds-text-color_error">
                    Open this page from an Account using the Item Purchase Tool button.
                </p>
            </template>

            <template if:true={hasRecordId}>
                <template if:true={hasAccount}>
                    <h2 class="slds-text-heading_small slds-var-m-bottom_small">Account</h2>
                    <dl class="account-details">
                        <div>
                            <dt>Name</dt>
                            <dd>{accountName}</dd>
                        </div>
                        <div>
                            <dt>Account Number</dt>
                            <dd>{accountNumber}</dd>
                        </div>
                        <div>
                            <dt>Industry</dt>
                            <dd>{accountIndustry}</dd>
                        </div>
                    </dl>
                    <p class="slds-var-m-top_large slds-text-color_weak">
                        Choose items from the catalog to start a purchase.
                    </p>
                    <template if:true={isManager}>
                        <lightning-button class="slds-var-m-top_small" label="New item" icon-name="utility:new" onclick={openItemForm}></lightning-button>
                    </template>

                    <section class="catalog slds-var-m-top_large">
                        <div class="catalog-header">
                            <h2 class="slds-text-heading_small">Item catalog</h2>
                            <div>
                                <span class="slds-badge slds-var-m-right_small">{itemCount} items</span>
                                <lightning-button label={cartLabel} icon-name="utility:cart" onclick={openCart}></lightning-button>
                            </div>
                        </div>

                        <div class="filters slds-var-m-vertical_medium">
                            <lightning-combobox
                                label="Family"
                                name="selectedFamily"
                                value={selectedFamily}
                                options={familyOptions}
                                onchange={handleFilterChange}>
                            </lightning-combobox>
                            <lightning-combobox
                                label="Type"
                                name="selectedType"
                                value={selectedType}
                                options={typeOptions}
                                onchange={handleFilterChange}>
                            </lightning-combobox>
                            <lightning-input
                                type="search"
                                label="Search by name or description"
                                value={searchTerm}
                                oninput={handleSearchChange}>
                            </lightning-input>
                        </div>

                        <template if:true={isLoading}>
                            <lightning-spinner alternative-text="Loading items" size="small"></lightning-spinner>
                        </template>

                        <template if:true={hasItems}>
                            <div class="item-grid">
                                <template for:each={items} for:item="item">
                                    <article key={item.Id} class="item-card">
                                        <template if:true={item.Image__c}>
                                            <img class="item-image" src={item.Image__c} alt={item.Name} />
                                        </template>
                                        <div class="slds-var-p-around_medium">
                                            <h3 class="slds-text-heading_small">{item.Name}</h3>
                                            <p class="slds-truncate slds-var-m-vertical_x-small">{item.Description__c}</p>
                                            <p><strong>{item.Price__c}</strong> per item</p>
                                            <p class="slds-text-body_small">Available: {item.AvailableQuantity__c}</p>
                                            <lightning-button
                                                class="slds-var-m-top_small"
                                                label="Details"
                                                data-id={item.Id}
                                                onclick={openDetails}>
                                            </lightning-button>
                                            <lightning-button
                                                class="slds-var-m-top_small slds-var-m-left_x-small"
                                                label="Add to cart"
                                                variant="brand"
                                                data-id={item.Id}
                                                disabled={item.isOutOfStock}
                                                onclick={addToCart}>
                                            </lightning-button>
                                        </div>
                                    </article>
                                </template>
                            </div>
                        </template>

                        <template if:false={hasItems}>
                            <template if:false={isLoading}>
                                <p class="slds-text-color_weak">No items match the selected filters.</p>
                            </template>
                        </template>
                    </section>
                </template>

                <template if:true={account.error}>
                    <p class="slds-text-color_error">{errorMessage}</p>
                </template>

                <template if:false={hasAccount}>
                    <template if:false={account.error}>
                        <lightning-spinner alternative-text="Loading account"></lightning-spinner>
                    </template>
                </template>
            </template>
        </div>
    </lightning-card>

    <template if:true={isDetailsOpen}>
        <section role="dialog" tabindex="-1" aria-modal="true" aria-label="Item details" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon
                        class="slds-modal__close"
                        icon-name="utility:close"
                        alternative-text="Close"
                        onclick={closeDetails}>
                    </lightning-button-icon>
                    <h2 class="slds-text-heading_medium">{selectedItem.Name}</h2>
                </header>
                <div class="slds-modal__content slds-var-p-around_medium">
                    <template if:true={selectedItemImageUrl}>
                        <img class="details-image slds-var-m-bottom_medium" src={selectedItemImageUrl} alt={selectedItem.Name} />
                    </template>
                    <lightning-record-view-form record-id={selectedItemId} object-api-name="Item__c">
                        <lightning-output-field field-name="Description__c"></lightning-output-field>
                        <lightning-output-field field-name="Family__c"></lightning-output-field>
                        <lightning-output-field field-name="Type__c"></lightning-output-field>
                        <lightning-output-field field-name="Price__c"></lightning-output-field>
                        <lightning-output-field field-name="AvailableQuantity__c"></lightning-output-field>
                    </lightning-record-view-form>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Close" onclick={closeDetails}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <template if:true={isCartOpen}>
        <section role="dialog" tabindex="-1" aria-modal="true" aria-label="Shopping cart" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon class="slds-modal__close" icon-name="utility:close" alternative-text="Close" onclick={closeCart}></lightning-button-icon>
                    <h2 class="slds-text-heading_medium">Cart</h2>
                </header>
                <div class="slds-modal__content slds-var-p-around_medium">
                    <template if:true={hasCartItems}>
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                            <thead><tr><th>Item</th><th>Quantity</th><th>Unit cost</th><th>Total</th><th></th></tr></thead>
                            <tbody>
                                <template for:each={cartItems} for:item="item">
                                    <tr key={item.itemId}>
                                        <td>{item.name}</td>
                                        <td>{item.quantity}</td>
                                        <td><lightning-formatted-number value={item.unitCost} format-style="currency" currency-code="USD"></lightning-formatted-number></td>
                                        <td><lightning-formatted-number value={item.lineTotal} format-style="currency" currency-code="USD"></lightning-formatted-number></td>
                                        <td><lightning-button-icon icon-name="utility:delete" alternative-text="Remove" data-id={item.itemId} onclick={removeFromCart}></lightning-button-icon></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                        <p class="slds-text-align_right slds-text-heading_small slds-var-m-top_medium">Total: <lightning-formatted-number value={cartTotal} format-style="currency" currency-code="USD"></lightning-formatted-number></p>
                    </template>
                    <template if:false={hasCartItems}><p class="slds-text-color_weak">Your cart is empty.</p></template>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Close" onclick={closeCart}></lightning-button>
                    <lightning-button class="slds-var-m-left_small" label="Checkout" variant="brand" disabled={isCheckoutDisabled} onclick={handleCheckout}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <template if:true={isItemFormOpen}>
        <section role="dialog" tabindex="-1" aria-modal="true" aria-label="Create item" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon class="slds-modal__close" icon-name="utility:close" alternative-text="Close" onclick={closeItemForm}></lightning-button-icon>
                    <h2 class="slds-text-heading_medium">Create catalog item</h2>
                </header>
                <lightning-record-edit-form object-api-name="Item__c" onsubmit={handleItemSubmit} onsuccess={handleItemSuccess} onerror={handleItemError}>
                    <div class="slds-modal__content slds-var-p-around_medium">
                        <lightning-messages></lightning-messages>
                        <lightning-input-field field-name="Name"></lightning-input-field>
                        <lightning-input-field field-name="Description__c"></lightning-input-field>
                        <lightning-input-field field-name="Family__c"></lightning-input-field>
                        <lightning-input-field field-name="Type__c"></lightning-input-field>
                        <lightning-input-field field-name="Price__c"></lightning-input-field>
                        <lightning-input-field field-name="AvailableQuantity__c"></lightning-input-field>
                        <p class="slds-text-body_small slds-text-color_weak slds-var-m-top_small">The image is requested from Unsplash automatically using the item name.</p>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancel" onclick={closeItemForm} disabled={isSavingItem}></lightning-button>
                        <lightning-button class="slds-var-m-left_small" type="submit" label="Create item" variant="brand" disabled={isSavingItem}></lightning-button>
                    </footer>
                </lightning-record-edit-form>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
